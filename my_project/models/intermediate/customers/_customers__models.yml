version: 2

models:
  - name: int_customer_orders
    columns:
      - name: customer_id
        tests:
          - not_null

      - name: order_id
        tests:
          - not_null

  - name: int_customer_revenue
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: total_revenue
        tests:
          - not_null