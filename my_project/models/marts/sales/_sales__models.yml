version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - not_null

      - name: line_revenue
        tests:
          - not_null

  - name: fct_order_items
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique

  - name: yearly_product_sales
    columns:
      - name: sales_year
        tests:
          - not_null

      - name: total_revenue
        tests:
          - not_null

  - name: top_products_by_year
    columns:
      - name: sales_year
        tests:
          - not_null

      - name: revenue_rank
        tests:
          - not_null