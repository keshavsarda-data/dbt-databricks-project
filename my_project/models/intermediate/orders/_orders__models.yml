version: 2

models:
  - name: int_orders_enriched
    columns:
      - name: order_id
        tests:
          - not_null

  - name: int_orders_with_products
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique

      - name: product_id
        tests:
          - not_null

  - name: int_order_payments
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique